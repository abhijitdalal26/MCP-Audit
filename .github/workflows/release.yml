name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release CLI binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/cli/go.sum

      - name: Run tests
        run: go test ./... -v -count=1 -timeout 120s

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"

          GOOS=linux   GOARCH=amd64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-linux-amd64 .
          GOOS=linux   GOARCH=arm64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-linux-arm64 .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-darwin-arm64 .
          GOOS=windows GOARCH=amd64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-windows-amd64.exe .

          ls -lh dist/

      - name: Generate checksums
        working-directory: packages/cli/dist
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MCPAudit CLI ${{ github.ref_name }}"
          body: |
            ## MCPAudit CLI ${{ github.ref_name }}

            Scans MCP configs (`claude_desktop_config.json`, `.cursor/mcp.json`) for security vulnerabilities against the OWASP MCP Top 10.
            **Runs 100% offline by default — your config never leaves your machine.**
            All 54 checks, zero data sent, no API key required.

            ### Install (macOS / Linux)

            ```bash
            curl -sSfL https://raw.githubusercontent.com/abhijitdalal26/MCP-Audit/master/packages/cli/install.sh | bash
            ```

            Or download the binary for your platform directly:

            | Platform | Binary |
            |----------|--------|
            | macOS Apple Silicon | `mcpaudit-darwin-arm64` |
            | macOS Intel | `mcpaudit-darwin-amd64` |
            | Linux x86-64 | `mcpaudit-linux-amd64` |
            | Linux ARM64 | `mcpaudit-linux-arm64` |
            | Windows x86-64 | `mcpaudit-windows-amd64.exe` |

            **Windows** — download `mcpaudit-windows-amd64.exe`, rename to `mcpaudit.exe`, add to PATH.

            ### Verify checksums
            ```bash
            curl -sSfL https://github.com/abhijitdalal26/MCP-Audit/releases/latest/download/checksums.txt | sha256sum --check
            ```

            ### Usage
            ```
            mcpaudit scan                          # auto-detect Claude Desktop / Cursor config
            mcpaudit scan path/to/mcp.json         # explicit file
            mcpaudit scan mcp.json --format sarif  # SARIF for GitHub Security tab
            mcpaudit scan mcp.json --fail-on high  # CI gate (exit 1 on high/critical)
            mcpaudit scan mcp.json --no-network    # fully air-gapped (skip OSV CVE lookup)
            ```

            ### GitHub Actions
            ```yaml
            - uses: abhijitdalal26/MCP-Audit/.github/actions/mcpaudit@master
              with:
                config-path: .cursor/mcp.json
                fail-on: high
            ```
          files: |
            packages/cli/dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

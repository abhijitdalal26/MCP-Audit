name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release CLI binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: packages/cli/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"

          GOOS=linux   GOARCH=amd64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-linux-amd64 .
          GOOS=linux   GOARCH=arm64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-linux-arm64 .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-darwin-arm64 .
          GOOS=windows GOARCH=amd64  go build -ldflags="-X main.Version=${VERSION} -s -w" -o dist/mcpaudit-windows-amd64.exe .

          ls -lh dist/

      - name: Generate checksums
        working-directory: packages/cli/dist
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MCPAudit CLI ${{ github.ref_name }}"
          body: |
            ## MCPAudit CLI ${{ github.ref_name }}

            Scans MCP configs (`claude_desktop_config.json`, `.cursor/mcp.json`) for security vulnerabilities.
            **Runs 100% offline by default — your config never leaves your machine.**
            All 51 checks run locally. No API key required. No data sent anywhere.

            ### Install

            **macOS (Apple Silicon)**
            ```bash
            curl -sSfL https://github.com/abhijitdalal26/MCP-Audit/releases/latest/download/mcpaudit-darwin-arm64 -o /usr/local/bin/mcpaudit && chmod +x /usr/local/bin/mcpaudit
            ```

            **macOS (Intel)**
            ```bash
            curl -sSfL https://github.com/abhijitdalal26/MCP-Audit/releases/latest/download/mcpaudit-darwin-amd64 -o /usr/local/bin/mcpaudit && chmod +x /usr/local/bin/mcpaudit
            ```

            **Linux**
            ```bash
            curl -sSfL https://github.com/abhijitdalal26/MCP-Audit/releases/latest/download/mcpaudit-linux-amd64 -o /usr/local/bin/mcpaudit && chmod +x /usr/local/bin/mcpaudit
            ```

            **Windows** — download `mcpaudit-windows-amd64.exe` from Assets below, rename to `mcpaudit.exe`, add to PATH.

            ### Usage
            ```
            mcpaudit scan                          # auto-detect Claude Desktop / Cursor config
            mcpaudit scan path/to/mcp.json         # explicit file
            mcpaudit scan mcp.json --format sarif  # SARIF for GitHub Security tab
            mcpaudit scan mcp.json --fail-on high  # CI gate
            mcpaudit scan mcp.json --no-network    # fully air-gapped (skip OSV CVE lookup)
            ```

            ### Verify checksums
            ```bash
            curl -sSfL https://github.com/abhijitdalal26/MCP-Audit/releases/latest/download/checksums.txt | sha256sum --check
            ```
          files: |
            packages/cli/dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
